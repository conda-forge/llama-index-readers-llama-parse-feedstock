{% set name = "llama-index-readers-llama-parse" %}
{% set version = "0.6.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/llama_index_readers_llama_parse-{{ version }}.tar.gz
  sha256: 6e086b7034a001bb0204e3431cb1cee5b6ec13f930acbf9a6e82c64aed72b09e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }},<4.0
    - llama-index-core >=0.13.0,<0.15
    - llama-parse >=0.5.0

test:
  imports:
    - llama_index.readers.llama_parse
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: llama-index readers llama-parse integration
  home: https://github.com/run-llama/llama_index/tree/main/llama-index-integrations/readers/llama-index-readers-llama-parse
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pavelzw
    - jan-janssen
